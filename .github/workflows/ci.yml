name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: node dist/cli/pmem.js --help
      - run: node dist/cli/pmem.js --version
      - run: npm pack --dry-run
